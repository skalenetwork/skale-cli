name: Publish Package

on:
  push:
    branches:
      - main
      - staging

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Set version and tag
        id: version
        run: |
          BRANCH=${GITHUB_REF##*/}
          BASE_VERSION=$(node -p "require('./package.json').version")
          
          if [[ "$BRANCH" == "main" ]]; then
            # Main: clean version, no prerelease suffix
            echo "VERSION=$BASE_VERSION" >> $GITHUB_ENV
            echo "NPM_TAG=latest" >> $GITHUB_ENV
            echo "PRERELEASE=false" >> $GITHUB_ENV
          else
            # Staging: prerelease version with incrementing number
            git fetch --tags
            for (( NUMBER=0; ; NUMBER++ )); do
              FULL_VERSION="$BASE_VERSION-$BRANCH.$NUMBER"
              if ! git tag -l | grep -q "$FULL_VERSION"; then
                echo "VERSION=$FULL_VERSION" >> $GITHUB_ENV
                break
              fi
            done
            echo "NPM_TAG=beta" >> $GITHUB_ENV
            echo "PRERELEASE=true" >> $GITHUB_ENV
          fi

      - name: Update package version
        run: npm version --no-git-tag-version $VERSION

      - name: Publish to npm (main)
        if: github.ref == 'refs/heads/main'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (staging)
        if: github.ref != 'refs/heads/main'
        run: npm publish --access public --tag ${{ env.NPM_TAG }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: actions/create-release@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION }}
          release_name: ${{ env.VERSION }}
          draft: false
          prerelease: ${{ env.PRERELEASE == 'true' }}
