name: Publish Package

on:
  push:
    branches:
      - main
      - staging

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Set version and tag
        id: version
        run: |
          BRANCH=${GITHUB_REF##*/}
          
          if [[ "$BRANCH" == "main" ]]; then
            NPM_TAG="latest"
            PRERELEASE="false"
          else
            NPM_TAG="beta"
            PRERELEASE="true"
          fi
          
          VERSION=$(bun -e "console.log(require('./package.json').version)")
          FULL_VERSION=$(BRANCH=$BRANCH VERSION=$VERSION bash ./scripts/calculate_version.sh)
          
          echo "VERSION=$FULL_VERSION" >> $GITHUB_ENV
          echo "NPM_TAG=$NPM_TAG" >> $GITHUB_ENV
          echo "PRERELEASE=$PRERELEASE" >> $GITHUB_ENV

      - name: Update package version
        run: |
          bun -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('./package.json')); pkg.version = '$VERSION'; fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2));"

      - name: Publish to npm (main)
        if: github.ref == 'refs/heads/main'
        run: bun publish --access public
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (staging)
        if: github.ref != 'refs/heads/main'
        run: bun publish --access public --tag ${{ env.NPM_TAG }}
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          draft: false
          prerelease: ${{ env.PRERELEASE == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
